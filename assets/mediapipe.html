<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
</head>
<body>
<script>
    function sendToRN(data) {
        try {
            window.ReactNativeWebView.postMessage(JSON.stringify(data));
        } catch (err) {
            console.log("[Bridge ERROR] Failed to send to RN:", String(err));
        }
    }

    function logStep(message) {
        sendToRN({ type: "LOG", message: message });
    }

    let poseLandmarker = null;

    function resolveTasksVisionGlobals() {
        const candidates = [window.MediaPipeTasksVision, window.vision, window].filter(Boolean);

        for (const candidate of candidates) {
            if (candidate.PoseLandmarker && candidate.FilesetResolver) {
                return {
                    PoseLandmarker: candidate.PoseLandmarker,
                    FilesetResolver: candidate.FilesetResolver,
                };
            }
        }

        return null;
    }

    async function resolveTasksVisionExports() {
        const globals = resolveTasksVisionGlobals();
        if (globals) {
            logStep("Using MediaPipe globals");
            return globals;
        }

        logStep("Globals missing, trying ESM import...");

        const moduleUrls = [
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/+esm",
            "https://unpkg.com/@mediapipe/tasks-vision@0.10.0/+esm",
        ];

        let lastError = null;

        for (const moduleUrl of moduleUrls) {
            try {
                const mod = await import(moduleUrl);
                if (mod.PoseLandmarker && mod.FilesetResolver) {
                    logStep("Loaded MediaPipe via ESM import");
                    return {
                        PoseLandmarker: mod.PoseLandmarker,
                        FilesetResolver: mod.FilesetResolver,
                    };
                }
                lastError = new Error("ESM module loaded but required exports were missing.");
            } catch (err) {
                lastError = err;
            }
        }

        throw new Error("Unable to resolve MediaPipe tasks exports. " + String(lastError));
    }

    async function loadModel() {
        try {
            logStep("Starting model load...");

            const exports = await resolveTasksVisionExports();
            const PoseLandmarker = exports.PoseLandmarker;
            const FilesetResolver = exports.FilesetResolver;

            logStep("Resolved MediaPipe task exports");

            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );

            logStep("FilesetResolver done");

            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath:
                        "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                    delegate: "CPU",
                },
                runningMode: "IMAGE",
                numPoses: 2,
            });

            sendToRN({ type: "MODEL_READY" });
            logStep("Model ready!");
        } catch (err) {
            sendToRN({ type: "ERROR", message: "Model load failed: " + String(err) });
        }
    }

    function parseIncomingData(rawData) {
        if (typeof rawData === "string") {
            return JSON.parse(rawData);
        }

        if (rawData && typeof rawData === "object") {
            return rawData;
        }

        throw new Error("Unsupported message payload type: " + typeof rawData);
    }

    async function handleIncomingMessage(event) {
        try {
            const data = parseIncomingData(event.data);
            logStep("Message received: " + (data.type || "unknown"));

            if (data.type !== "ANALYZE") {
                return;
            }

            if (!poseLandmarker) {
                sendToRN({ type: "ERROR", message: "Model not ready yet" });
                return;
            }

            if (typeof data.image !== "string" || data.image.length === 0) {
                sendToRN({ type: "ERROR", message: "ANALYZE payload missing image string" });
                return;
            }

            logStep("Analyze image length: " + data.image.length);

            const img = new Image();
            img.onload = () => {
                try {
                    logStep("Image loaded " + img.width + "x" + img.height);

                    const result = poseLandmarker.detect(img);
                    const poseCount = result && result.landmarks ? result.landmarks.length : 0;
                    logStep("Detection complete. Pose count: " + poseCount);

                    sendToRN({
                        type: "RESULT",
                        poses: (result && result.landmarks) || [],
                        worldPoses: (result && result.worldLandmarks) || [],
                    });
                } catch (err) {
                    sendToRN({ type: "ERROR", message: "Detect failed: " + String(err) });
                }
            };

            img.onerror = (err) => {
                sendToRN({ type: "ERROR", message: "Image failed to load: " + String(err) });
            };

            img.src = data.image;
        } catch (err) {
            sendToRN({ type: "ERROR", message: "Message handling failed: " + String(err) });
        }
    }

    // iOS + injected MessageEvent path
    window.addEventListener("message", handleIncomingMessage);
    // Android legacy path used by some WebView integrations
    document.addEventListener("message", handleIncomingMessage);
</script>

<!-- Load AFTER the inline script so globals are ready when script tag fires onload -->
<script
        src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js"
        crossorigin="anonymous"
        onload="loadModel()"
        onerror="sendToRN({ type: 'ERROR', message: 'Failed to load MediaPipe script' })"
></script>
</body>
</html>
