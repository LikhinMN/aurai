<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
</head>
<body>
<script>
    function sendToRN(data) {
        window.ReactNativeWebView.postMessage(JSON.stringify(data));
    }

    let poseLandmarker = null;

    function resolveTasksVisionGlobals() {
        const candidates = [
            window.MediaPipeTasksVision,
            window.vision,
            window,
        ].filter(Boolean);

        for (const candidate of candidates) {
            if (candidate.PoseLandmarker && candidate.FilesetResolver) {
                return {
                    PoseLandmarker: candidate.PoseLandmarker,
                    FilesetResolver: candidate.FilesetResolver,
                };
            }
        }

        return null;
    }

    async function resolveTasksVisionExports() {
        const globals = resolveTasksVisionGlobals();
        if (globals) {
            sendToRN({ type: "LOG", message: "Using MediaPipe globals" });
            return globals;
        }

        sendToRN({ type: "LOG", message: "Globals missing, trying ESM import..." });

        const moduleUrls = [
            "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/+esm",
            "https://unpkg.com/@mediapipe/tasks-vision@0.10.0/+esm",
        ];

        let lastError = null;

        for (const moduleUrl of moduleUrls) {
            try {
                const mod = await import(moduleUrl);
                if (mod.PoseLandmarker && mod.FilesetResolver) {
                    sendToRN({ type: "LOG", message: "Loaded MediaPipe via ESM import" });
                    return {
                        PoseLandmarker: mod.PoseLandmarker,
                        FilesetResolver: mod.FilesetResolver,
                    };
                }
                lastError = new Error("ESM module loaded but required exports were missing.");
            } catch (err) {
                lastError = err;
            }
        }

        throw new Error(`Unable to resolve MediaPipe tasks exports. ${String(lastError)}`);
    }

    async function loadModel() {
        try {
            sendToRN({ type: "LOG", message: "Starting model load..." });

            const { PoseLandmarker, FilesetResolver } = await resolveTasksVisionExports();

            sendToRN({ type: "LOG", message: "Resolved MediaPipe task exports" });

            const vision = await FilesetResolver.forVisionTasks(
                "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm"
            );

            sendToRN({ type: "LOG", message: "FilesetResolver done" });

            poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
                baseOptions: {
                    modelAssetPath:
                        "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
                    delegate: "CPU",
                },
                runningMode: "IMAGE",
                numPoses: 2,
            });

            sendToRN({ type: "MODEL_READY" });
            sendToRN({ type: "LOG", message: "Model ready!" });

        } catch (err) {
            sendToRN({ type: "ERROR", message: err.toString() });
        }
    }

    window.addEventListener("message", async (event) => {
        try {
            const data = JSON.parse(event.data);

            if (data.type === "ANALYZE") {
                if (!poseLandmarker) {
                    sendToRN({ type: "ERROR", message: "Model not ready yet" });
                    return;
                }
                const img = new Image();
                img.onload = () => {
                    try {
                        const result = poseLandmarker.detect(img);
                        sendToRN({
                            type: "RESULT",
                            poses: result.landmarks,
                            worldPoses: result.worldLandmarks,
                        });
                    } catch (err) {
                        sendToRN({ type: "ERROR", message: "Detect failed: " + err.toString() });
                    }
                };
                img.onerror = () => sendToRN({ type: "ERROR", message: "Image failed to load" });
                img.src = data.image;
            }
        } catch (err) {
            sendToRN({ type: "ERROR", message: "Message parse failed: " + err.toString() });
        }
    });
</script>

<!-- Load AFTER the inline script so globals are ready when script tag fires onload -->
<script
        src="https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/vision_bundle.js"
        crossorigin="anonymous"
        onload="loadModel()"
        onerror="sendToRN({ type: 'ERROR', message: 'Failed to load MediaPipe script' })"
></script>
</body>
</html>
